apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: microservices-demo
  labels:
    app: user-service
spec:
  type: ClusterIP          # Change to LoadBalancer or NodePort if testing locally with minikube/kind
  selector:
    app: user-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http
